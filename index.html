<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>سكنى - منصة إيجار السكنات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="details.html">
</head>
<body>

<section class="housing-section">
    <div class="container">
        <h2 class="section-title">السكنات المتاحة</h2>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="ابحث عن: حوض 10، بنزايون، المساكن...">
            <button id="searchBtn">بحث</button>
        </div>

        <div class="accommodations-grid" id="accommodationsGrid">
            </div>

        <div id="noResults" class="text-center py-5" style="display: none; width: 100%;">
            <p style="font-size: 1.2rem; color: #666;">للأسف، لا توجد نتائج مطابقة لبحثك 🔍</p>
            <button onclick="resetSearch()" class="custom-btn-outline" style="margin-top: 10px;">عرض كل السكنات</button>
        </div>

        <div class="load-more-wrapper">
            <button id="loadMoreBtn" class="custom-btn-outline">عرض المزيد</button>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
